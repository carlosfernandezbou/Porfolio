<section id="contact">
  <div class="section-header">
    <div class="section-tag">// 05. contacto</div>
    <h2 class="section-title">Hablemos</h2>
    <span class="section-line"></span>
  </div>
  <p class="contact-intro">
    Estoy buscando una oportunidad como desarrollador. Si tienes un proyecto o una posición, ¡me encantaría escucharte!
  </p>
  <div class="contact-grid">
    <a *ngFor="let item of contactItems" [href]="item.href" [target]="item.external ? '_blank' : '_self'" class="contact-card">
      <div class="contact-icon">{{ item.icon }}</div>
      <div class="contact-info">
        <div class="label">{{ item.label }}</div>
        <div class="value">{{ item.value }}</div>
      </div>
    </a>
  </div>
</section>
